<!-- ===== GENERIC REGISTER MODAL ===== -->
<div class="modal" id="genericRegisterModal">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h2 class="modal-title">Register Entry Form</h2>
            <button class="modal-close" onclick="closeRegisterEntryModal()">
                <span class="material-icons-round">close</span>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Entry Date *</label>
                    <input type="date" class="form-control" id="regEntryDate" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Entry Time *</label>
                    <input type="time" class="form-control" id="regEntryTime" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Shift *</label>
                    <select class="form-control" id="regEntryShift" required>
                        <option value="">Select Shift</option>
                        <option value="1">Shift 1 (08:00 to 16:00)</option>
                        <option value="2">Shift 2 (16:00 to 00:00)</option>
                        <option value="3">Shift 3 (00:00 to 08:00)</option>
                        <option value="G">General Shift</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Created By</label>
                    <input type="text" class="form-control" value="Nupesh Patel" disabled>
                </div>
                
                <!-- Dynamic Fields Placeholder -->
                <div id="dynamicFormFieldsContainer" style="display: contents;">
                    <!-- Register specific fields injected here via registersModule.js -->
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Remarks / Description</label>
                    <textarea class="form-control" id="regEntryRemarks" rows="3" placeholder="Enter remarks or detailed description..."></textarea>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Attachments (Images/Documents)</label>
                    <input type="file" class="form-control" multiple>
                    <small style="color: var(--text-secondary); margin-top: 4px; display: block;">Supported files: JPG, PNG, PDF (Max 5MB)</small>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeRegisterEntryModal()">Cancel</button>
            <button class="btn btn-outline">Save Draft</button>
            <button class="btn btn-primary" onclick="saveRegisterEntry()">Submit Entry</button>
        </div>
    </div>
</div>
