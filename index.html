<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>66 KV Substation - Monthly Report App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --primary: #1565c0;
            --primary-dark: #0d47a1;
            --primary-light: #e3f2fd;
            --accent: #00897b;
            --accent-dark: #00695c;
            --success: #2e7d32;
            --danger: #c62828;
            --danger-light: #ffebee;
            --warning: #f57f17;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5f6368;
            --border: #e0e0e0;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
            --radius: 14px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== APP HEADER ===== */
        .app-header {
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 40%, #00897b 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(13,71,161,0.3);
        }
        .app-header h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .app-header .subtitle {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 4px;
            font-weight: 500;
        }
        .header-back {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }
        .header-back:hover { background: rgba(255,255,255,0.35); }
        .header-back:active { transform: translateY(-50%) scale(0.92); }

        /* ===== CONTENT AREA ===== */
        .content { max-width: 900px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }

        /* ===== VIEW TRANSITIONS ===== */
        .view { display: none; animation: fadeSlideIn 0.35s ease; }
        .view.active { display: block; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== DASHBOARD CARDS ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }
        .ss-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .ss-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        .ss-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--primary-light); }
        .ss-card:active { transform: translateY(0) scale(0.98); }
        .ss-card .card-name { font-size: 16px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }
        .ss-card .card-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; }
        .ss-card .card-meta span { display: flex; align-items: center; gap: 4px; }
        .ss-card .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .ss-card .card-actions button {
            flex: 1;
            padding: 8px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-report { background: var(--primary); color: white; }
        .btn-report:hover { background: var(--primary-dark); }
        .btn-edit { background: var(--primary-light); color: var(--primary-dark); }
        .btn-edit:hover { background: #bbdefb; }
        .btn-delete-card { background: var(--danger-light); color: var(--danger); }
        .btn-delete-card:hover { background: #ffcdd2; }

        /* New Substation Card */
        .new-ss-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 40px 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 150px;
        }
        .new-ss-card:hover { border-color: var(--primary); background: var(--primary-light); }
        .new-ss-card:active { transform: scale(0.97); }
        .new-ss-card .plus-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 28px; font-weight: 700;
        }
        .new-ss-card .plus-text { font-size: 14px; font-weight: 600; color: var(--text-secondary); }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 24px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-light), transparent);
        }

        /* ===== FORM STYLES ===== */
        .form-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: var(--text);
            background: white;
            transition: var(--transition);
            -webkit-appearance: none;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(21,101,192,0.12);
        }

        /* ===== DYNAMIC LIST ITEMS ===== */
        .list-item {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 10px;
            display: grid;
            gap: 10px;
            align-items: end;
            animation: fadeSlideIn 0.25s ease;
        }
        .list-item-3col { grid-template-columns: 2fr 1fr auto; }
        .list-item-4col { grid-template-columns: 2fr 0.8fr 1.2fr auto; }
        .list-item-tr { grid-template-columns: 1fr 1fr 1fr auto; }
        .list-item-opp { grid-template-columns: 1.5fr 1.5fr auto; }
        .list-item .form-input, .list-item .form-select {
            padding: 10px;
            font-size: 13px;
        }
        .list-item .form-label { margin-bottom: 4px; font-size: 10px; }
        .btn-remove {
            width: 36px; height: 36px;
            border: none;
            background: var(--danger-light);
            color: var(--danger);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            align-self: end;
        }
        .btn-remove:hover { background: #ffcdd2; }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(21,101,192,0.3); }
        .btn-success { background: linear-gradient(135deg, var(--success), var(--accent-dark)); color: white; }
        .btn-success:hover { box-shadow: 0 4px 16px rgba(46,125,50,0.3); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { box-shadow: 0 4px 16px rgba(198,40,40,0.3); }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover { background: var(--primary-light); }
        .btn-add {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 10px 16px;
            font-size: 13px;
            width: 100%;
            border: 2px dashed var(--primary);
            border-radius: var(--radius-sm);
        }
        .btn-add:hover { background: #bbdefb; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn-group .btn { flex: 1; min-width: 120px; }

        /* ===== REPORT TABLE ===== */
        .report-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .report-card-header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .report-card-header.cat-66kv { background: linear-gradient(135deg, #0d47a1, #1565c0); }
        .report-card-header.cat-trhv { background: linear-gradient(135deg, #4a148c, #7b1fa2); }
        .report-card-header.cat-trlv { background: linear-gradient(135deg, #e65100, #f57c00); }
        .report-card-header.cat-11kv { background: linear-gradient(135deg, #1b5e20, #2e7d32); }
        .report-card-header.cat-other { background: linear-gradient(135deg, #37474f, #546e7a); }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: #f1f5f9;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        td input[type="number"] {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: white;
            transition: var(--transition);
            min-width: 70px;
        }
        td input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(21,101,192,0.12);
        }
        .td-name { font-weight: 600; color: var(--text); font-size: 12px; }
        .td-calc { font-weight: 700; color: var(--primary-dark); text-align: center; }
        .td-mf { font-weight: 600; color: var(--accent-dark); text-align: center; }

        /* Totals/Loss rows */
        .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
        .summary-row:last-child { border-bottom: none; }
        .summary-label { font-size: 13px; font-weight: 600; color: var(--text); }
        .summary-value { font-size: 16px; font-weight: 800; color: var(--primary-dark); }
        .summary-value.loss { color: var(--danger); }
        .summary-value.loss.good { color: var(--success); }

        /* Opposite SS green inputs */
        .green-input {
            background: #e8f5e9 !important;
            border-color: #a5d6a7 !important;
        }
        .green-input:focus {
            border-color: var(--success) !important;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.12) !important;
        }

        /* ===== MONTH INPUT ===== */
        .month-bar {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .month-bar label { font-weight: 700; font-size: 14px; color: var(--primary-dark); white-space: nowrap; }
        .month-bar input {
            padding: 10px 16px;
            border: 2px solid var(--primary);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 700;
            color: var(--danger);
            text-transform: uppercase;
            text-align: center;
            font-family: 'Inter', sans-serif;
            flex: 1;
            min-width: 140px;
        }
        .month-bar input:focus { outline: none; box-shadow: 0 0 0 3px rgba(21,101,192,0.12); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #323232;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .empty-state p { font-size: 14px; }

        /* ===== SAMPLE BADGE ===== */
        .badge-sample {
            display: inline-block;
            background: linear-gradient(135deg, #ff6f00, #f57f17);
            color: white;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app-header { padding: 16px; }
            .app-header h1 { font-size: 16px; }
            .content { padding: 12px; padding-bottom: 100px; }
            .card-grid { grid-template-columns: 1fr; }

            /* Mobile table: stacked cards */
            .mobile-stack thead { display: none; }
            .mobile-stack tbody tr {
                display: block;
                background: #f8fafc;
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                margin-bottom: 10px;
                padding: 12px;
            }
            .mobile-stack td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 0;
                border-bottom: 1px solid #eee;
                gap: 8px;
            }
            .mobile-stack td:last-child { border-bottom: none; }
            .mobile-stack td::before {
                content: attr(data-label);
                font-size: 10px;
                font-weight: 700;
                color: var(--text-secondary);
                text-transform: uppercase;
                white-space: nowrap;
                min-width: 80px;
            }
            .mobile-stack td input[type="number"] { max-width: 120px; text-align: right; }
            .mobile-stack .td-name { font-size: 13px; }
            .mobile-stack .td-name::before { display: none; }
            .mobile-stack td.td-name {
                background: linear-gradient(135deg, var(--primary-light), #e0f2f1);
                margin: -12px -12px 6px;
                padding: 10px 12px;
                border-radius: var(--radius-sm) var(--radius-sm) 0 0;
                border-bottom: 2px solid var(--primary);
                display: block;
            }

            /* List items stack on mobile */
            .list-item-4col, .list-item-3col, .list-item-tr, .list-item-opp {
                grid-template-columns: 1fr;
            }
            .btn-remove { align-self: center; }
            .btn-group { flex-direction: column; }
            .btn-group .btn { min-width: auto; }
        }

        @media (max-width: 400px) {
            .app-header h1 { font-size: 14px; }
            .month-bar { flex-direction: column; }
            .summary-value { font-size: 14px; }
        }

        /* Print/PDF styles */
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .content { padding: 0; max-width: none; }
            .report-card { box-shadow: none; border: 1px solid #ddd; }
            .app-header { position: static; }
        }
    </style>
</head>
<body>

    <!-- ===== APP HEADER ===== -->
    <div class="app-header" id="appHeader">
        <button class="header-back" id="headerBack" style="display:none" onclick="navigateTo('dashboard')">←</button>
        <h1 id="headerTitle">⚡ 66 KV SUBSTATION REPORT</h1>
        <div class="subtitle" id="headerSubtitle">Monthly Report App</div>
    </div>

    <!-- ===== DASHBOARD VIEW ===== -->
    <div class="content">
        <div id="dashboardView" class="view active">
            <div class="section-title">📋 Your Substations</div>
            <div class="card-grid" id="ssCardGrid">
                <!-- Cards rendered by JS -->
            </div>
        </div>

        <!-- ===== SETUP VIEW ===== -->
        <div id="setupView" class="view">
            <div class="form-card">
                <div class="form-group">
                    <label class="form-label">Substation Name</label>
                    <input type="text" class="form-input" id="setupName" placeholder="e.g., 66 K.V. HALVAD-3 S/S">
                </div>
            </div>

            <!-- Feeders Section — Category-wise -->
            <div id="feederCategorySetup"></div>

            <!-- Transformers Section -->
            <div class="section-title">🔌 Transformers</div>
            <div id="transformerList"></div>
            <button class="btn btn-add" onclick="addTransformerRow()">+ Add Transformer</button>

            <!-- Opposite SS Section -->
            <div class="section-title">📡 Opposite SS Entries (Line Loss)</div>
            <div id="oppositeList"></div>
            <button class="btn btn-add" onclick="addOppositeRow()">+ Add Opposite SS Entry</button>

            <div class="btn-group">
                <button class="btn btn-success" onclick="saveSubstation()">💾 Save Substation</button>
                <button class="btn btn-danger" id="btnDeleteSS" style="display:none" onclick="deleteSubstation()">🗑️ Delete</button>
            </div>
        </div>

        <!-- ===== REPORT VIEW ===== -->
        <div id="reportView" class="view">
            <div class="month-bar no-print">
                <label for="reportMonth">📅 MONTH :</label>
                <input type="text" id="reportMonth" placeholder="e.g., JUN-2026">
            </div>

            <!-- Feeder Readings — Category-wise (rendered by JS) -->
            <div id="feederCategoryContainer"></div>

            <!-- Opposite SS Inputs -->
            <div class="report-card" id="oppositeCard" style="display:none">
                <div class="report-card-header">📡 Opposite SS End Units (Line Loss)</div>
                <div id="oppositeInputs" style="padding: 12px;"></div>
            </div>

            <!-- Calculate Button -->
            <div class="btn-group no-print" style="margin-bottom: 16px;">
                <button class="btn btn-success" onclick="calculateReport()" style="flex:2">📊 Calculate & Generate Report</button>
                <button class="btn btn-outline" onclick="resetReport()">↺ Reset</button>
            </div>

            <!-- Totals Section -->
            <div class="report-card" id="totalsCard" style="display:none">
                <div class="report-card-header">📊 Totals</div>
                <div id="totalsBody"></div>
            </div>

            <!-- Loss Calculation Section -->
            <div class="report-card" id="lossCard" style="display:none">
                <div class="report-card-header">📉 Loss Calculation</div>
                <div id="lossBody"></div>
            </div>

            <!-- PDF Button -->
            <div class="btn-group no-print" id="pdfBtnGroup" style="display:none">
                <button class="btn btn-primary" onclick="exportPDF()">📄 Save as PDF</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

<script>
// ===================================================================
//  CONSTANTS — Feeder Roles
// ===================================================================
const ROLES = {
    '66kv_incoming':  { label: '66 KV Incoming Line',       color: '#1565c0' },
    '66kv_outgoing':  { label: '66 KV Outgoing Line',       color: '#0d47a1' },
    'tr_hv':          { label: 'Transformer HV Side',       color: '#6a1b9a' },
    'tr_lv':          { label: 'Transformer LV Side',       color: '#7b1fa2' },
    '11kv_feeder':    { label: '11 KV Feeder',              color: '#2e7d32' },
    'solar_import':   { label: 'Solar Import',              color: '#f57f17' },
    'solar_export':   { label: 'Solar Export',              color: '#ff8f00' },
    'station_aux':    { label: 'Station Auxiliary',          color: '#00897b' },
    'info_only':      { label: 'Info Only (No Calculation)', color: '#78909c' }
};

// Which roles contribute to which totals
const FEEDER_TOTAL_ROLES = ['11kv_feeder', 'solar_export', 'station_aux'];
const RECEIVED_ROLES     = ['66kv_incoming', 'solar_import'];
const SENT_ROLES         = ['66kv_outgoing']; // + feederTotal

// ===================================================================
//  HALVAD-3 SAMPLE DATA
// ===================================================================

// ===================================================================
//  DATA MANAGEMENT — LocalStorage
// ===================================================================
const STORAGE_KEY = '66kv_substations';

function loadSubstations() {
    let data = localStorage.getItem(STORAGE_KEY);
    if (!data) {
        // First load: seed with Halvad-3 sample
        let initial = [JSON.parse(JSON.stringify(HALVAD3_SAMPLE))];
        saveSubstations(initial);
        return initial;
    }
    return JSON.parse(data);
}

function saveSubstations(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function getSubstation(id) {
    return loadSubstations().find(s => s.id === id);
}

function generateId() {
    return 'ss_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
}

// ===================================================================
//  STATE
// ===================================================================
let currentView = 'dashboard';
let editingSSId = null;      // null = creating new
let reportSSId = null;       // which SS is open in report view

// ===================================================================
//  NAVIGATION
// ===================================================================
function navigateTo(view, ssId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    currentView = view;

    if (view === 'dashboard') {
        document.getElementById('dashboardView').classList.add('active');
        document.getElementById('headerBack').style.display = 'none';
        document.getElementById('headerTitle').textContent = '⚡ 66 KV SUBSTATION REPORT';
        document.getElementById('headerSubtitle').textContent = 'Monthly Report App';
        renderDashboard();
    } else if (view === 'setup') {
        document.getElementById('setupView').classList.add('active');
        document.getElementById('headerBack').style.display = 'flex';
        editingSSId = ssId || null;
        if (editingSSId) {
            let ss = getSubstation(editingSSId);
            document.getElementById('headerTitle').textContent = '✏️ Edit Substation';
            document.getElementById('headerSubtitle').textContent = ss.name;
        } else {
            document.getElementById('headerTitle').textContent = '➕ New Substation';
            document.getElementById('headerSubtitle').textContent = 'Create a new substation';
        }
        renderSetupForm();
    } else if (view === 'report') {
        document.getElementById('reportView').classList.add('active');
        document.getElementById('headerBack').style.display = 'flex';
        reportSSId = ssId;
        let ss = getSubstation(ssId);
        document.getElementById('headerTitle').textContent = '📊 ' + ss.name;
        document.getElementById('headerSubtitle').textContent = 'Monthly Report';
        renderReportPage();
    }

    window.scrollTo(0, 0);
}

// ===================================================================
//  DASHBOARD RENDERING
// ===================================================================
function renderDashboard() {
    const grid = document.getElementById('ssCardGrid');
    const subs = loadSubstations();

    let html = '';
    subs.forEach(ss => {
        const feeders = ss.feeders || [];
        const trCount = ss.transformers ? ss.transformers.length : 0;
        const reportCount = ss.reports ? Object.keys(ss.reports).length : 0;
        const sampleBadge = ss.isSample ? '<span class="badge-sample">SAMPLE</span>' : '';

        // Helper to count unique physical lines (combining Import/Export pairs)
        function getUniqueCount(list, rolesFilter) {
            const active = list.filter(f => {
                if (f.role === 'info_only') return false;
                if (rolesFilter) return rolesFilter.includes(f.role);
                return true;
            });
            const uniqueNames = new Set(active.map(f => {
                return f.name
                    .replace(/\(I\)/i, '')
                    .replace(/\(E\)/i, '')
                    .replace(/IMPORT/i, '')
                    .replace(/EXPORT/i, '')
                    .replace(/INPORT/i, '')
                    .replace(/\s+/g, ' ')
                    .trim();
            }));
            return uniqueNames.size;
        }

        // Category-wise counts of unique physical lines
        const cnt66kv = getUniqueCount(feeders, ['66kv_incoming', '66kv_outgoing']);
        const cntTR   = (ss.transformers ? ss.transformers.length : 0);
        const cntTrLV = getUniqueCount(feeders, ['tr_lv']);
        const cnt11kv = getUniqueCount(feeders, ['11kv_feeder', 'solar_import', 'solar_export', 'station_aux']);
        const feederTotal = getUniqueCount(feeders);

        html += `
        <div class="ss-card">
            <div class="card-name">${ss.name} ${sampleBadge}</div>
            <div class="card-meta" style="flex-direction:column; gap:6px;">
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <span style="color:#0d47a1;">🔌 ${cnt66kv} 66KV Line</span>
                    <span style="color:#7b1fa2;">⚡ ${cntTR} TR</span>
                </div>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <span style="color:#e65100;">🔋 ${cntTrLV} 11KV Incoming</span>
                    <span style="color:#2e7d32;">📡 ${cnt11kv} 11KV Feeder</span>
                </div>
                <div style="display:flex; gap:12px; flex-wrap:wrap; padding-top:6px; border-top:1px solid #e0e0e0; margin-top:2px;">
                    <span style="font-weight:700; color:#1a1a2e;">⏲️ Total Meter: ${feederTotal}</span>
                    <span>📊 ${reportCount} Reports</span>
                </div>
            </div>
            <div class="card-actions">
                <button class="btn-report" onclick="event.stopPropagation(); navigateTo('report','${ss.id}')">📊 Report</button>
                <button class="btn-edit" onclick="event.stopPropagation(); navigateTo('setup','${ss.id}')">✏️ Edit</button>
                <button class="btn-delete-card" onclick="event.stopPropagation(); deleteSSFromDashboard('${ss.id}')">🗑️</button>
            </div>
        </div>`;
    });

    html += `
    <div class="new-ss-card" onclick="navigateTo('setup')">
        <div class="plus-icon">+</div>
        <div class="plus-text">New Substation</div>
    </div>`;

    grid.innerHTML = html;
}

function deleteSSFromDashboard(id) {
    let ss = getSubstation(id);
    if (!confirm(`Delete "${ss.name}"? This cannot be undone.`)) return;
    let subs = loadSubstations().filter(s => s.id !== id);
    saveSubstations(subs);
    renderDashboard();
    showToast('Substation deleted');
}

// ---- Save / Delete Substation ----
function saveSubstation() {
    let name = document.getElementById('setupName').value.trim();
    if (!name) { showToast('⚠️ Please enter substation name'); return; }
    if (setupFeeders.length === 0) { showToast('⚠️ Add at least one feeder'); return; }

    let subs = loadSubstations();

    if (editingSSId) {
        let idx = subs.findIndex(s => s.id === editingSSId);
        if (idx >= 0) {
            subs[idx].name = name;
            subs[idx].feeders = setupFeeders;
            subs[idx].transformers = setupTransformers;
            subs[idx].oppositeSSEntries = setupOpposites;
        }
    } else {
        subs.push({
            id: generateId(),
            name: name,
            isSample: false,
            feeders: setupFeeders,
            transformers: setupTransformers,
            oppositeSSEntries: setupOpposites,
            reports: {}
        });
    }

    saveSubstations(subs);
    showToast('✅ Substation saved!');
    navigateTo('dashboard');
}

function deleteSubstation() {
    if (!editingSSId) return;
    let ss = getSubstation(editingSSId);
    if (!confirm(`Delete "${ss.name}"? This cannot be undone.`)) return;
    let subs = loadSubstations().filter(s => s.id !== editingSSId);
    saveSubstations(subs);
    showToast('Substation deleted');
    navigateTo('dashboard');
}

function loadReportData(report) {
    if (!report || !report.readings) return;
    Object.entries(report.readings).forEach(([key, val]) => {
        let el = document.getElementById(key);
        if (el) el.value = val;
    });
    if (report.oppositeReadings) {
        Object.entries(report.oppositeReadings).forEach(([key, val]) => {
            let el = document.getElementById(key);
            if (el) el.value = val;
        });
    }
    liveCalc();
}

// ===================================================================
//  CALCULATION ENGINE (Generalized from Halvad-3)
// ===================================================================
function getVal(id) {
    let el = document.getElementById(id);
    if (!el) return 0;
    let val = parseFloat(el.value);
    return isNaN(val) ? 0 : val;
}

function fmt(val) {
    if (isNaN(val) || !isFinite(val)) return '-';
    return parseFloat(val.toFixed(2));
}

function fmtPercent(val) {
    if (isNaN(val) || !isFinite(val)) return '- %';
    return val.toFixed(2) + ' %';
}

function liveCalc() {
    let ss = getSubstation(reportSSId);
    if (!ss) return;

    let fData = {};
    ss.feeders.forEach(f => {
        let r24 = getVal('r24_' + f.id);
        let r00 = getVal('r00_' + f.id);
        let diff = (r24 > 0 || r00 > 0) ? (r24 - r00) : 0;
        let units = diff * f.mf;

        let diffEl = document.getElementById('diff_' + f.id);
        let unitsEl = document.getElementById('units_' + f.id);
        if (diffEl) diffEl.textContent = fmt(diff);
        if (unitsEl) unitsEl.textContent = fmt(units);

        fData[f.id] = units;
    });
}

function calculateReport() {
    let ss = getSubstation(reportSSId);
    if (!ss) return;

    // 1) Calculate all feeder units
    let fData = {};
    ss.feeders.forEach(f => {
        let r24 = getVal('r24_' + f.id);
        let r00 = getVal('r00_' + f.id);
        let diff = (r24 > 0 || r00 > 0) ? (r24 - r00) : 0;
        let units = diff * f.mf;

        let diffEl = document.getElementById('diff_' + f.id);
        let unitsEl = document.getElementById('units_' + f.id);
        if (diffEl) diffEl.textContent = fmt(diff);
        if (unitsEl) unitsEl.textContent = fmt(units);

        fData[f.id] = units;
    });

    // 2) Feeder Total
    let feederTotal = 0;
    ss.feeders.forEach(f => {
        if (FEEDER_TOTAL_ROLES.includes(f.role)) feederTotal += (fData[f.id] || 0);
    });

    // 3) Total Received
    let totalReceived = 0;
    ss.feeders.forEach(f => {
        if (RECEIVED_ROLES.includes(f.role)) totalReceived += (fData[f.id] || 0);
    });

    // 4) Total Sent
    let totalSent = feederTotal;
    ss.feeders.forEach(f => {
        if (SENT_ROLES.includes(f.role)) totalSent += (fData[f.id] || 0);
    });

    // 5) S/S Loss
    let ssLoss = totalReceived !== 0 ? ((totalReceived - totalSent) / totalReceived) * 100 : 0;

    // 6) Transformer Losses
    let trLosses = [];
    if (ss.transformers) {
        ss.transformers.forEach(tr => {
            let hvUnits = fData[tr.hvFeederId] || 0;
            let lvUnits = fData[tr.lvFeederId] || 0;
            let loss = hvUnits !== 0 ? ((hvUnits - lvUnits) / hvUnits) * 100 : 0;
            trLosses.push({ name: tr.name + ' LOSS', value: loss });
        });
    }

    // 7) Line Loss (from Opposite SS entries)
    let lineLosses = [];
    if (ss.oppositeSSEntries) {
        ss.oppositeSSEntries.forEach(o => {
            let oppVal = getVal('opp_' + o.id);
            let feeder = ss.feeders.find(f => f.id === o.linkedFeederId);
            if (!feeder) return;
            let feederUnits = fData[feeder.id] || 0;

            let loss = 0;
            if (feeder.role === '66kv_incoming') {
                // Power comes FROM opposite SS TO this SS
                loss = oppVal > 0 ? ((oppVal - feederUnits) / oppVal) * 100 : 0;
            } else if (feeder.role === '66kv_outgoing') {
                // Power goes FROM this SS TO opposite SS
                loss = feederUnits > 0 ? ((feederUnits - oppVal) / feederUnits) * 100 : 0;
            }
            lineLosses.push(loss);
        });
    }
    let avgLineLoss = lineLosses.length > 0 ? lineLosses.reduce((a,b) => a+b, 0) / lineLosses.length : 0;

    // 8) 66 KV Bus Loss
    let kv66_in = 0;
    let kv66_out = 0;
    ss.feeders.forEach(f => {
        if (f.role === '66kv_incoming') kv66_in += (fData[f.id] || 0);
        if (f.role === '66kv_outgoing') kv66_out += (fData[f.id] || 0);
        if (f.role === 'tr_hv') kv66_out += (fData[f.id] || 0);
    });
    let bus66Loss = kv66_in !== 0 ? ((kv66_in - kv66_out) / kv66_in) * 100 : 0;

    // 9) 11 KV Bus Loss
    let kv11_in = 0;
    ss.feeders.forEach(f => {
        if (f.role === 'tr_lv') kv11_in += (fData[f.id] || 0);
        if (f.role === 'solar_import') kv11_in += (fData[f.id] || 0);
    });
    let bus11Loss = kv11_in !== 0 ? ((kv11_in - feederTotal) / kv11_in) * 100 : 0;

    // ===== RENDER TOTALS =====
    let totalsCard = document.getElementById('totalsCard');
    totalsCard.style.display = 'block';
    document.getElementById('totalsBody').innerHTML = `
        <div class="summary-row"><span class="summary-label">FEEDER TOTAL</span><span class="summary-value">${fmt(feederTotal)}</span></div>
        <div class="summary-row"><span class="summary-label">TOTAL RECEIVED</span><span class="summary-value">${fmt(totalReceived)}</span></div>
        <div class="summary-row"><span class="summary-label">TOTAL SENT</span><span class="summary-value">${fmt(totalSent)}</span></div>
    `;

    // ===== RENDER LOSSES =====
    let lossCard = document.getElementById('lossCard');
    lossCard.style.display = 'block';
    let lossHtml = `
        <div class="summary-row"><span class="summary-label">S/S LOSS</span><span class="summary-value loss ${ssLoss < 3 ? 'good' : ''}">${fmtPercent(ssLoss)}</span></div>
    `;
    trLosses.forEach(tl => {
        lossHtml += `<div class="summary-row"><span class="summary-label">${tl.name}</span><span class="summary-value loss ${tl.value < 3 ? 'good' : ''}">${fmtPercent(tl.value)}</span></div>`;
    });
    lossHtml += `
        <div class="summary-row"><span class="summary-label">LINE LOSS</span><span class="summary-value loss ${avgLineLoss < 3 ? 'good' : ''}">${fmtPercent(avgLineLoss)}</span></div>
        <div class="summary-row"><span class="summary-label">66 K.V. BUS LOSS</span><span class="summary-value loss ${bus66Loss < 3 ? 'good' : ''}">${fmtPercent(bus66Loss)}</span></div>
        <div class="summary-row"><span class="summary-label">11 K.V. BUS LOSS</span><span class="summary-value loss ${bus11Loss < 3 ? 'good' : ''}">${fmtPercent(bus11Loss)}</span></div>
    `;
    document.getElementById('lossBody').innerHTML = lossHtml;

    // Show PDF button
    document.getElementById('pdfBtnGroup').style.display = 'flex';

    // Save report data
    saveCurrentReport();

    showToast('✅ Report Generated!');

    // Scroll to results
    totalsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function saveCurrentReport() {
    let ss = getSubstation(reportSSId);
    if (!ss) return;

    let month = document.getElementById('reportMonth').value;
    let readings = {};
    let oppositeReadings = {};

    ss.feeders.forEach(f => {
        let r24 = document.getElementById('r24_' + f.id);
        let r00 = document.getElementById('r00_' + f.id);
        if (r24 && r24.value) readings['r24_' + f.id] = r24.value;
        if (r00 && r00.value) readings['r00_' + f.id] = r00.value;
    });

    if (ss.oppositeSSEntries) {
        ss.oppositeSSEntries.forEach(o => {
            let el = document.getElementById('opp_' + o.id);
            if (el && el.value) oppositeReadings['opp_' + o.id] = el.value;
        });
    }

    let subs = loadSubstations();
    let idx = subs.findIndex(s => s.id === reportSSId);
    if (idx >= 0) {
        if (!subs[idx].reports) subs[idx].reports = {};
        subs[idx].reports[month] = {
            month: month,
            readings: readings,
            oppositeReadings: oppositeReadings,
            generatedAt: new Date().toISOString()
        };
        saveSubstations(subs);
    }
}

function resetReport() {
    if (!confirm('Clear all data for this report?')) return;
    let ss = getSubstation(reportSSId);
    if (!ss) return;

    ss.feeders.forEach(f => {
        let r24 = document.getElementById('r24_' + f.id);
        let r00 = document.getElementById('r00_' + f.id);
        if (r24) r24.value = '';
        if (r00) r00.value = '';
        let diff = document.getElementById('diff_' + f.id);
        let units = document.getElementById('units_' + f.id);
        if (diff) diff.textContent = '0';
        if (units) units.textContent = '0';
    });

    if (ss.oppositeSSEntries) {
        ss.oppositeSSEntries.forEach(o => {
            let el = document.getElementById('opp_' + o.id);
            if (el) el.value = '';
        });
    }

    document.getElementById('totalsCard').style.display = 'none';
    document.getElementById('lossCard').style.display = 'none';
    document.getElementById('pdfBtnGroup').style.display = 'none';

    showToast('Data cleared');
}

// ===================================================================
//  PDF EXPORT
// ===================================================================
function exportPDF() {
    let ss = getSubstation(reportSSId);
    let month = document.getElementById('reportMonth').value;

    // Create a temporary visible container for PDF generation
    let pdfContainer = document.createElement('div');
    pdfContainer.id = 'pdfTempContainer';
    pdfContainer.style.background = '#ffffff';
    pdfContainer.style.color = '#333333';
    pdfContainer.style.padding = '20px';
    pdfContainer.style.width = '100%';
    pdfContainer.style.boxSizing = 'border-box';
    
    // Inject original report styles
    let styles = `
        <style>
            #pdfTempContainer {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                padding: 20px;
                background-color: #ffffff;
            }
            #pdfTempContainer h2 {
                text-align: center;
                color: #1a73e8;
                margin-top: 0;
                margin-bottom: 5px;
                font-size: 22px;
                font-weight: 700;
            }
            #pdfTempContainer .month-label {
                text-align: center;
                color: #d93025;
                font-weight: bold;
                font-size: 16px;
                margin-bottom: 20px;
                text-transform: uppercase;
            }
            #pdfTempContainer table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 15px;
                font-size: 13px;
                background-color: #ffffff;
                page-break-inside: auto;
            }
            #pdfTempContainer tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
            #pdfTempContainer thead {
                display: table-header-group;
            }
            #pdfTempContainer th, #pdfTempContainer td {
                border: 1px solid #dcdcdc;
                padding: 6px;
                text-align: left;
                vertical-align: middle;
            }
            #pdfTempContainer th {
                background-color: #1a73e8;
                color: white;
                font-weight: bold;
                text-transform: uppercase;
            }
            #pdfTempContainer input[type="number"] {
                width: 100%;
                padding: 6px;
                box-sizing: border-box;
                border: 1px solid #babbbd;
                border-radius: 4px;
                font-size: 13px;
                font-weight: bold;
                color: #333;
                text-align: center;
                background-color: #ffffff;
            }
            #pdfTempContainer .readonly {
                font-weight: bold;
                color: #333;
                text-align: center;
            }
            #pdfTempContainer .green-input {
                background-color: #92D050 !important;
                font-weight: bold;
                border: 1px solid #75a840 !important;
                color: #000;
                border-radius: 4px;
                text-align: center;
                padding: 6px;
                width: 100%;
                box-sizing: border-box;
            }
            #pdfTempContainer .section-title {
                margin-top: 25px;
                background-color: #34a853;
                color: white;
                padding: 8px 12px;
                border-radius: 6px;
                font-size: 15px;
                font-weight: bold;
                text-transform: uppercase;
                page-break-inside: avoid;
                break-inside: avoid;
                page-break-after: avoid;
                break-after: avoid;
            }
            #pdfTempContainer .highlight-table th {
                background-color: #5f6368;
                color: white;
            }
            #pdfTempContainer .total-row {
                background-color: #fff3cd;
                font-weight: bold;
            }
        </style>
    `;

    // 1) Build Feeder rows
    let feederRows = '';
    ss.feeders.forEach(f => {
        let r24_val = document.getElementById('r24_' + f.id).value || '';
        let r00_val = document.getElementById('r00_' + f.id).value || '';
        let diff_val = document.getElementById('diff_' + f.id).innerText || '0';
        let units_val = document.getElementById('units_' + f.id).innerText || '0';

        feederRows += `
            <tr>
                <td><strong>${f.name}</strong></td>
                <td><input type="number" value="${r24_val}" disabled style="-webkit-print-color-adjust: exact;"></td>
                <td><input type="number" value="${r00_val}" disabled style="-webkit-print-color-adjust: exact;"></td>
                <td class="readonly">${diff_val}</td>
                <td class="readonly" style="text-align:center;">${f.mf}</td>
                <td class="readonly">${units_val}</td>
            </tr>
        `;
    });

    // 2) Fetch Totals values
    let totalsBody = document.getElementById('totalsBody');
    let totalsRows = '';
    if (totalsBody) {
        let items = totalsBody.querySelectorAll('.summary-row');
        items.forEach(item => {
            let label = item.querySelector('.summary-label').innerText;
            let val = item.querySelector('.summary-value').innerText;
            totalsRows += `
                <tr class="total-row" style="-webkit-print-color-adjust: exact; background-color: #fff3cd;">
                    <td width="60%">${label}</td>
                    <td class="readonly">${val}</td>
                </tr>
            `;
        });
    }

    // 3) Fetch Opposite SS values
    let oppositeRows = '';
    if (ss.oppositeSSEntries) {
        ss.oppositeSSEntries.forEach(o => {
            let val = document.getElementById('opp_' + o.id).value || '';
            oppositeRows += `
                <tr>
                    <td width="60%"><strong>${o.name}</strong></td>
                    <td><input type="number" class="green-input" value="${val}" disabled style="-webkit-print-color-adjust: exact;"></td>
                </tr>
            `;
        });
    }

    // 4) Fetch Loss Calculations
    let lossRows = '';
    let lossBody = document.getElementById('lossBody');
    if (lossBody) {
        let items = lossBody.querySelectorAll('.summary-row');
        items.forEach(item => {
            let label = item.querySelector('.summary-label').innerText;
            let val = item.querySelector('.summary-value').innerText;
            lossRows += `
                <tr>
                    <td><strong>${label}</strong></td>
                    <td class="readonly">${val}</td>
                </tr>
            `;
        });
    }

    // Combine everything
    pdfContainer.innerHTML = `
        ${styles}
        <h2>${ss.name} - MONTHLY REPORT</h2>
        <div class="month-label">MONTH : ${month}</div>
        
        <table>
            <thead>
                <tr>
                    <th>NAME OF FEEDER</th>
                    <th>METER READING 24:00</th>
                    <th>METER READING 00:00</th>
                    <th>DIFFERENCE</th>
                    <th>M.F.</th>
                    <th>TOTAL UNITS</th>
                </tr>
            </thead>
            <tbody>
                ${feederRows}
            </tbody>
        </table>
        
        <div class="section-title" style="-webkit-print-color-adjust: exact; background-color: #34a853;">TOTALS</div>
        <table>
            <tbody>
                ${totalsRows}
            </tbody>
        </table>
        
        ${oppositeRows ? `
            <div class="section-title" style="-webkit-print-color-adjust: exact; background-color: #34a853;">OPPOSITE SS END UNITS (For Line Loss)</div>
            <table>
                <tbody>
                    ${oppositeRows}
                </tbody>
            </table>
        ` : ''}
        
        <div class="section-title" style="-webkit-print-color-adjust: exact; background-color: #34a853;">LOSS CALCULATION</div>
        <table class="highlight-table">
            <thead>
                <tr style="-webkit-print-color-adjust: exact; background-color: #5f6368;">
                    <th>LOSS TYPE</th>
                    <th>PERCENTAGE (%)</th>
                </tr>
            </thead>
            <tbody>
                ${lossRows}
            </tbody>
        </table>
    `;

    // Hide main app views temporarily
    let appHeader = document.getElementById('appHeader');
    let content = document.querySelector('.content');
    
    appHeader.style.display = 'none';
    content.style.display = 'none';

    document.body.appendChild(pdfContainer);

    // Optimized margins (top: 10mm, left/right: 13mm, bottom: 15mm) to maximize space utilization
    let opt = {
        margin: [0.4, 0.5, 0.6, 0.5],
        filename: ss.name.replace(/\s+/g, '_') + '_' + month + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 3, useCORS: true, scrollY: 0, logging: false },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css'] }
    };

    showToast('⏳ Generating PDF...');

    // Small delay to ensure browser layout engine settles on the newly appended container
    setTimeout(() => {
        html2pdf().set(opt).from(pdfContainer).toPdf().get('pdf').then(function (pdf) {
            var totalPages = pdf.internal.getNumberOfPages();
            for (var i = 1; i <= totalPages; i++) {
                pdf.setPage(i);
                pdf.setFontSize(8);
                pdf.setTextColor(120);
                
                var pageWidth = pdf.internal.pageSize.getWidth();
                var pageHeight = pdf.internal.pageSize.getHeight();
                
                // Draw a light grey separator line for the footer just above the bottom margin
                pdf.setLineWidth(0.005);
                pdf.setDrawColor(220);
                pdf.line(0.5, pageHeight - 0.45, pageWidth - 0.5, pageHeight - 0.45);
                
                // Footer details
                var footerTextLeft = ss.name + " - MONTHLY REPORT (" + month + ")";
                var footerTextRight = "Page " + i + " of " + totalPages;
                
                pdf.text(footerTextLeft, 0.5, pageHeight - 0.3);
                pdf.text(footerTextRight, pageWidth - 0.5, pageHeight - 0.3, { align: 'right' });
            }
        }).save().then(() => {
            // Restore main view
            document.body.removeChild(pdfContainer);
            appHeader.style.display = '';
            content.style.display = '';
            showToast('📄 PDF downloaded!');
        }).catch(err => {
            console.error(err);
            document.body.removeChild(pdfContainer);
            appHeader.style.display = '';
            content.style.display = '';
            showToast('❌ PDF Generation Failed');
        });
    }, 150);
}

// ===================================================================
//  TOAST NOTIFICATION
// ===================================================================
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===================================================================
//  INIT
// ===================================================================
document.addEventListener('DOMContentLoaded', () => {
    renderDashboard();
});
</script>
